<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cyber RC Dashboard - SharePoint</title>
<style>
:root {
  --bg:#06101d; --bg2:#08182c; --panel:rgba(7, 23, 43, 0.7); --line:rgba(110, 225, 255, 0.2);
  --line-bright:rgba(91, 236, 255, 0.75); --text:#d6f6ff; --muted:#7ea8b6; --accent:#5be5ff;
  --accent2:#8b5cf6;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;font-family:Inter,Segoe UI,Arial,sans-serif;color:var(--text);background:radial-gradient(circle at top, #0b223d 0%, #050b15 45%, #02060b 100%);min-height:100%;}
body::before, body::after {content:""; position:fixed; inset:0; pointer-events:none; z-index:-1;}
body::before {background:linear-gradient(rgba(91,229,255,.08) 1px, transparent 1px),linear-gradient(90deg, rgba(91,229,255,.08) 1px, transparent 1px),radial-gradient(circle at 20% 20%, rgba(139,92,246,.15), transparent 25%),radial-gradient(circle at 80% 10%, rgba(45,212,191,.08), transparent 20%),radial-gradient(circle at 50% 90%, rgba(91,229,255,.08), transparent 18%);background-size:42px 42px,42px 42px,auto,auto,auto;mask-image:linear-gradient(to bottom, rgba(0,0,0,.95), rgba(0,0,0,.65));}
body::after {background: radial-gradient(circle at center, rgba(91,229,255,.1), transparent 50%); filter: blur(20px);}
a{color:var(--accent);text-decoration:none}
.wrapper{max-width:1400px;margin:0 auto;padding:28px 24px 64px;}
.sp-banner{margin:0 0 18px;padding:14px 16px;border-radius:18px;border:1px solid rgba(110,225,255,.16);background:linear-gradient(90deg, rgba(91,229,255,.08), rgba(139,92,246,.08));}
.nav{display:flex;gap:12px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:24px}
.brand{display:flex;align-items:center;gap:14px}
.brand-badge{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg, rgba(91,229,255,.18), rgba(139,92,246,.22));border:1px solid var(--line);display:grid;place-items:center;box-shadow:0 0 18px rgba(91,229,255,.15)}
.brand h1{font-size:1.2rem;margin:0;letter-spacing:.08em;text-transform:uppercase}
.brand p{margin:2px 0 0;color:var(--muted);font-size:.9rem}
.nav-links{display:flex;gap:10px;flex-wrap:wrap}
.nav-links a{padding:10px 14px;border:1px solid var(--line);background:rgba(8,24,44,.55);border-radius:999px;color:var(--text)}
.nav-links a.active,.nav-links a:hover{border-color:var(--line-bright);box-shadow:0 0 20px rgba(91,229,255,.12), inset 0 0 12px rgba(91,229,255,.06)}
.hero,.two-col,.filter-grid{display:grid;gap:20px}
.hero{grid-template-columns:1.3fr .9fr;margin-bottom:22px}
.two-col{grid-template-columns:1fr 1fr;margin-top:18px}
.filter-grid{grid-template-columns:320px 1fr}
.panel{background:linear-gradient(180deg, rgba(10,28,50,.78), rgba(5,16,30,.72));border:1px solid var(--line);border-radius:24px;padding:22px;box-shadow:inset 0 1px 0 rgba(255,255,255,.04), 0 0 24px rgba(2,12,23,.45);backdrop-filter: blur(10px)}
.panel h2,.panel h3{margin:0 0 12px}
.hero h2{font-size:2rem;line-height:1.1;margin-bottom:10px}
.eyebrow{display:inline-flex;gap:8px;align-items:center;padding:6px 10px;border:1px solid var(--line);border-radius:999px;color:var(--accent);font-size:.78rem;text-transform:uppercase;letter-spacing:.14em;margin-bottom:12px;background:rgba(9,27,46,.55)}
.subtle,.small{color:var(--muted);line-height:1.6}
.grid{display:grid;gap:18px}
.kpis{grid-template-columns:repeat(auto-fit,minmax(180px,1fr));margin-top:18px}
.kpi{padding:18px;border-radius:20px;background:rgba(5,17,32,.55);border:1px solid rgba(110,225,255,.14)}
.kpi .label{font-size:.82rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.kpi .value{font-size:1.9rem;margin-top:8px;font-weight:700}
.kpi .hint{font-size:.85rem;color:#9fcbdb;margin-top:4px}
.chart{padding:18px;border-radius:22px;background:rgba(4,15,29,.62);border:1px solid rgba(110,225,255,.12)}
.bar-list{display:flex;flex-direction:column;gap:12px}
.bar-row{display:grid;grid-template-columns:120px 1fr 60px;gap:12px;align-items:center}
.bar-wrap{height:12px;background:rgba(255,255,255,.05);border-radius:999px;overflow:hidden;border:1px solid rgba(110,225,255,.08)}
.bar{height:100%;border-radius:999px;background:linear-gradient(90deg, var(--accent), var(--accent2));box-shadow:0 0 12px rgba(91,229,255,.25)}
.metric-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.ring{position:relative;width:146px;height:146px;border-radius:50%;margin:8px auto;background:conic-gradient(var(--accent) calc(var(--pct)*1%), rgba(255,255,255,.06) 0)}
.ring::before{content:"";position:absolute;inset:13px;border-radius:50%;background:linear-gradient(180deg, rgba(10,28,50,.95), rgba(5,16,30,.9));border:1px solid rgba(110,225,255,.08)}
.ring-label{position:absolute;inset:0;display:grid;place-items:center;text-align:center;font-weight:700;z-index:1}
.ring-label span{display:block;font-size:.78rem;color:var(--muted);font-weight:500;margin-top:3px}
.table-wrap{overflow:auto;margin-top:18px;max-height:520px}
table{width:100%;border-collapse:collapse;font-size:.95rem}
th,td{padding:12px 10px;border-bottom:1px solid rgba(110,225,255,.09);text-align:left}
th{color:#8fe8ff;font-size:.82rem;text-transform:uppercase;letter-spacing:.08em;position:sticky;top:0;background:rgba(6,16,29,.98)}
tr:hover td{background:rgba(91,229,255,.03)}
.badge{display:inline-block;padding:5px 10px;border-radius:999px;border:1px solid rgba(110,225,255,.15);background:rgba(91,229,255,.06);font-size:.8rem}
.timeline{display:flex;align-items:end;gap:12px;height:240px;padding-top:12px}
.timeline .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:10px}
.timeline .stick{width:100%;max-width:72px;border-radius:16px 16px 0 0;background:linear-gradient(180deg, rgba(139,92,246,.9), rgba(91,229,255,.65));border:1px solid rgba(110,225,255,.12);box-shadow:0 0 16px rgba(91,229,255,.12)}
.timeline .val{font-weight:700}
.callout{padding:16px 18px;border:1px solid rgba(139,92,246,.28);background:linear-gradient(90deg, rgba(139,92,246,.14), rgba(91,229,255,.06));border-radius:18px}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:14px}
.btn{appearance:none;border:1px solid var(--line);background:rgba(8,24,44,.75);color:var(--text);padding:10px 14px;border-radius:999px;cursor:pointer;font:inherit;box-shadow:0 0 0 rgba(0,0,0,0)}
.btn:hover{border-color:var(--line-bright);box-shadow:0 0 16px rgba(91,229,255,.12)}
.btn.primary{background:linear-gradient(90deg, rgba(91,229,255,.16), rgba(139,92,246,.16));}
.hidden-input{display:none}
.import-note,.footer-note{margin-top:10px;color:var(--muted);font-size:.88rem}
.notice{margin-top:18px;padding:14px 16px;border-radius:18px;border:1px solid rgba(110,225,255,.15);background:rgba(91,229,255,.05)}
.view{display:none} .view.active{display:block}
.page-title{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;flex-wrap:wrap;margin-bottom:16px}
.filter-card{padding:18px;border-radius:20px;background:rgba(5,17,32,.55);border:1px solid rgba(110,225,255,.14)}
.select{width:100%;padding:12px 14px;border-radius:14px;border:1px solid rgba(110,225,255,.2);background:rgba(9,27,46,.85);color:var(--text);font:inherit}
.month-chips{display:flex;flex-wrap:wrap;gap:10px}
.month-chip{padding:10px 12px;border-radius:999px;border:1px solid rgba(110,225,255,.12);background:rgba(7,23,43,.55);min-width:110px}
.month-chip.active{border-color:var(--line-bright);box-shadow:0 0 16px rgba(91,229,255,.16), inset 0 0 12px rgba(91,229,255,.08);background:linear-gradient(90deg, rgba(91,229,255,.12), rgba(139,92,246,.12))}
.month-chip .m{display:block;font-weight:700} .month-chip .s{display:block;margin-top:4px;font-size:.78rem;color:var(--muted)}
.matrix{display:grid;gap:12px}
.matrix-row{display:grid;grid-template-columns:120px 1fr 1fr 1fr;gap:12px;align-items:stretch}
.matrix-row>div{padding:14px 16px;border-radius:18px;background:rgba(7,23,43,.45);border:1px solid rgba(110,225,255,.10)}
.month-name{display:flex;align-items:center;font-weight:700} .hl{border-color:var(--line-bright)!important;box-shadow:0 0 18px rgba(91,229,255,.12), inset 0 0 12px rgba(91,229,255,.05);background:linear-gradient(180deg, rgba(91,229,255,.08), rgba(139,92,246,.08))!important}
.matrix .label{display:block;font-size:.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px} .matrix .value{font-size:1.4rem;font-weight:700}
.empty-state{padding:18px;border-radius:18px;border:1px dashed rgba(110,225,255,.18);color:var(--muted);text-align:center}
.filter-toolbar{display:flex;gap:18px;justify-content:space-between;align-items:end;flex-wrap:wrap}
.filter-control{min-width:220px;display:grid;gap:8px}
.select:focus{outline:none;border-color:var(--line-bright);box-shadow:0 0 0 3px rgba(91,236,255,.08)}
@media (max-width:980px){.hero,.two-col,.filter-grid{grid-template-columns:1fr}.metric-grid{grid-template-columns:1fr 1fr}.matrix-row{grid-template-columns:1fr}}
@media (max-width:720px){.wrapper{padding:20px 14px 40px}.metric-grid{grid-template-columns:1fr}.bar-row{grid-template-columns:95px 1fr 46px}.hero h2{font-size:1.55rem}}
</style>
</head>

  const metrics=XLSX.utils.sheet_to_json(wb.Sheets['Metrics'],{defval:''}).map(r=>({month:r.Month||'', editor:r.Editor||'', quality:Number(r.Quality)||0, productivity:Number(r.Productivity)||0, efficiency:Number(r.Efficiency)||0, utilization:Number(r.Utilization)||0})).filter(r=>r.month||r.editor);
  const tasks=XLSX.utils.sheet_to_json(wb.Sheets['Task Management'],{defval:''}).map(r=>({month:r.Month||'', editor:r.Editor||'', task_type:r['Task Type']||'', status:r.Status||'', count:Number(r.Count)||1})).filter(r=>r.month||r.editor||r.task_type||r.status||Number(r.Count));
  const mirroring=XLSX.utils.sheet_to_json(wb.Sheets['Mirroring'],{defval:''}).map(r=>{const date=normalizeDate(r.Month); return {date, month:monthNameFromDate(date), editor:r.Editor||'', asset:r['Mirrored Asset']||'', status:r.Status||''};}).filter(r=>r.date||r.editor||r.asset||r.status);
  return {metrics,tasks,mirroring};
}
function importWorkbook(evt){
  const file=evt.target.files&&evt.target.files[0];
  if(!file) return;
  if(!window.XLSX){alert('Import requires the XLSX library to load.'); return;}
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const wb=XLSX.read(e.target.result, {type:'array', cellDates:true});
      saveData(parseWorkbookToDashboardData(wb));
      localStorage.setItem('cyberDashboardLastAutoRefresh', new Date().toISOString());
      alert('Template imported successfully.');
      renderApp();
    }catch(err){console.error(err); alert('Could not import this workbook. Please use the provided template structure.');}
  };
  reader.readAsArrayBuffer(file);
}
async function autoLoadWorkbook(force=false){
  if(!AUTO_REFRESH_FROM_WORKBOOK || !window.XLSX) return;
  const last=localStorage.getItem('cyberDashboardLastAutoRefresh');
  if(!force && last && (Date.now()-Date.parse(last) < AUTO_REFRESH_INTERVAL_MS)) return;
  try{
    const url=TEMPLATE_WORKBOOK_NAME + '?v=' + Date.now();
    const response=await fetch(url, {cache:'no-store'});
    if(!response.ok) throw new Error('Workbook fetch failed: '+response.status+' '+response.statusText);
    const buffer=await response.arrayBuffer();
    const wb=XLSX.read(buffer, {type:'array', cellDates:true});
    saveData(parseWorkbookToDashboardData(wb));
    localStorage.setItem('cyberDashboardLastAutoRefresh', new Date().toISOString());
    renderApp();
  }catch(err){
    console.warn('Auto-refresh from workbook was not completed.', err);
  }
}
function exportWorkbook(){if(!window.XLSX){alert('Export requires the XLSX library to load.'); return;} const d=getData(); const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([['Month','Editor','Quality','Productivity','Efficiency','Utilization'],...d.metrics.map(r=>[r.month,r.editor,r.quality,r.productivity,r.efficiency,r.utilization])]),'Metrics'); XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([['Month','Editor','Task Type','Status','Count'],...d.tasks.map(r=>[r.month,r.editor,r.task_type,r.status,Number(r.count)||1])]),'Task Management'); XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([['Month','Editor','Mirrored Asset','Status'],...d.mirroring.map(r=>[r.date||r.month,r.editor,r.asset,r.status])]),'Mirroring'); XLSX.writeFile(wb,'Metrics_and_task_template_export.xlsx');}
function nav(){return `<div class="nav"><div class="brand"><div class="brand-badge">◈</div><div><h1>Cyber RC Dashboard</h1><p>Your one stop shop for RC Data</p></div></div><div class="nav-links"><a href="#overview">Overview</a><a href="#metrics">Metrics</a><a href="#tasks">Task Management</a><a href="#mirroring">Mirroring</a></div></div>`;}
function ringCard(label,value,sub='Average across rows'){const pct=Math.max(0,Math.min(100,Number(value)||0)); return `<div class="panel chart"><h3>${label}</h3><div class="ring" style="--pct:${pct}"><div class="ring-label">${fmt(pct)}%<span>${sub}</span></div></div></div>`;}
function allEditors(raw){return [...new Set([...(raw.metrics||[]).map(r=>r.editor), ...(raw.tasks||[]).map(r=>r.editor), ...(raw.mirroring||[]).map(r=>r.editor)].filter(Boolean))].sort((a,b)=>a.localeCompare(b));}
function getAvailableMonths(raw){return monthSort([...new Set([...(raw.metrics||[]).map(r=>r.month), ...(raw.tasks||[]).map(r=>r.month), ...(raw.mirroring||[]).map(r=>r.month)].filter(Boolean))]);}
function filterByEditor(raw, editor){if(!editor || editor==='All Editors') return raw; const d={metrics:(raw.metrics||[]).filter(r=>r.editor===editor), tasks:(raw.tasks||[]).filter(r=>r.editor===editor), mirroring:(raw.mirroring||[]).filter(r=>r.editor===editor)}; d.summary=summarizeData(d); return d;}
function filterByMonth(raw, month){if(!month || month==='All Months') return raw; const d={metrics:(raw.metrics||[]).filter(r=>r.month===month), tasks:(raw.tasks||[]).filter(r=>r.month===month), mirroring:(raw.mirroring||[]).filter(r=>r.month===month)}; d.summary=summarizeData(d); return d;}
function monthSummary(filtered){const months=monthSort([...new Set([...(filtered.metrics||[]).map(r=>r.month), ...(filtered.tasks||[]).map(r=>r.month), ...(filtered.mirroring||[]).map(r=>r.month)].filter(Boolean))]); return months.map(month=>{const mRows=(filtered.metrics||[]).filter(r=>r.month===month), tRows=(filtered.tasks||[]).filter(r=>r.month===month), mirRows=(filtered.mirroring||[]).filter(r=>r.month===month); const avg=k=>mRows.length?round2(mRows.reduce((a,b)=>a+(+b[k]||0),0)/mRows.length):0; return {month, quality:avg('quality'), productivity:avg('productivity'), efficiency:avg('efficiency'), utilization:avg('utilization'), tasks:tRows.length, mirroring:mirRows.length, metricsActive:mRows.length>0, tasksActive:tRows.length>0, mirroringActive:mirRows.length>0};});}
function filterPanel(raw, filtered, editor, month){const editors=allEditors(raw), months=monthSummary(filtered), monthOptions=getAvailableMonths(raw); return `<section class="panel"><div class="filter-grid"><div class="filter-card"><div class="eyebrow">Dashboard Filters</div><h3 style="margin-top:0">Highlight by editor and month</h3><p class="small">Choose a month filter to refresh the KPIs, charts, and tables throughout the dashboard.</p><div class="filter-toolbar"><div class="filter-control"><label class="small" for="editorFilter">Editor</label><select class="select" id="editorFilter"><option${editor==='All Editors'?' selected':''}>All Editors</option>${editors.map(name=>`<option${name===editor?' selected':''}>${name}</option>`).join('')}</select></div><div class="filter-control"><label class="small" for="monthFilter">Month</label><select class="select" id="monthFilter"><option${month==='All Months'?' selected':''}>All Months</option>${monthOptions.map(name=>`<option${name===month?' selected':''}>${name}</option>`).join('')}</select></div></div></div><div class="filter-card"><div class="eyebrow">Monthly Highlights</div><h3 style="margin-top:0">Current filtered coverage</h3><div class="month-chips">${months.length?months.map(item=>`<div class="month-chip ${month==='All Months'||month===item.month?'active':''}"><span class="m">${item.month}</span><span class="s">Q ${fmt(item.quality)}% • T ${fmt(item.tasks,0)} • M ${fmt(item.mirroring,0)}</span></div>`).join(''):'<div class="empty-state" style="width:100%">No records for the selected filters.</div>'}</div></div></div></section>`;}
function monthlyMatrix(filtered, editor){const rows=monthSummary(filtered); if(!rows.length) return '<div class="panel"><div class="empty-state">No monthly data available for this editor filter.</div></div>'; return `<section class="panel"><div class="page-title"><div><h2>Monthly highlight matrix</h2><p>${editor==='All Editors'?'Combined team view by month.':'Spotlight for '+editor+' across all three worksheets.'}</p></div><div class="badge">${rows.length} active month${rows.length===1?'':'s'}</div></div><div class="matrix">${rows.map(r=>`<div class="matrix-row"><div class="month-name hl">${r.month}</div><div class="${r.metricsActive?'hl':''}"><span class="label">Metrics</span><div class="value">${r.metricsActive?fmt(r.quality)+'%':'—'}</div><div class="small">Prod ${r.metricsActive?fmt(r.productivity)+'%':'—'} • Eff ${r.metricsActive?fmt(r.efficiency)+'%':'—'} • Util ${r.metricsActive?fmt(r.utilization)+'%':'—'}</div></div><div class="${r.tasksActive?'hl':''}"><span class="label">Tasks</span><div class="value">${r.tasksActive?fmt(r.tasks,0):'—'}</div><div class="small">Task count in the month</div></div><div class="${r.mirroringActive?'hl':''}"><span class="label">Mirroring</span><div class="value">${r.mirroringActive?fmt(r.mirroring,0):'—'}</div><div class="small">Mirroring rows in the month</div></div></div>`).join('')}</div></section>`;}
function renderOverview(raw, filtered, editor, month){const sm=filtered.summary.metrics.overall_avg, tasks=filtered.summary.tasks, mir=filtered.summary.mirroring, taskCountMap=tasks.by_count||tasks.by_type||{}, topTaskCount=topEntries(taskCountMap,1)[0]||['—',0]; return `<section class="view active" data-view="overview"><section class="hero"><div class="panel"><div class="eyebrow">Share Point • Regulatory Compliance</div><h2>Performance & Metrics Dashboard</h2><p class="subtle">Import / Export Functions.</p>${dataToolbar()}<div class="notice"><strong>Editor highlighting enabled:</strong> choose an editor below to focus the dashboard on their monthly metrics, task rows, and mirroring records.</div><div class="kpis grid"><div class="kpi"><div class="label">Avg Quality</div><div class="value">${fmt(sm.quality)}%</div><div class="hint">${editor}</div></div><div class="kpi"><div class="label">Total Tasks</div><div class="value">${fmt(tasks.total_tasks,0)}</div><div class="hint">${editor}</div></div><div class="kpi"><div class="label">Mirroring Records</div><div class="value">${fmt(mir.total_records,0)}</div><div class="hint">${editor}</div></div><div class="kpi"><div class="label">Highest Task Count</div><div class="value">${fmt(topTaskCount[1],0)}</div><div class="hint">${topTaskCount[0]}</div></div></div></div><div class="panel"><h3>System Links</h3><div class="grid"><a class="callout" href="https://login.microsoftonline.com/9274ee3f-9425-4109-a27f-9fb15c10675d/saml2?SAMLRequest=jZJBT%2bMwEIX%2fSuTD3lqnqbcEUxeZJmirpYDaAqu9Delsaym2sx6n8PNJg5CQkCpu1njmed77PCWwdSNH1KprbX4ltwl8qqqBNAi5cuhyUjS4ERA7IgAA&client-request-id=8000a7e4-d4f6-4277-ace6-a005bfe75e1e&mscrid=8000a7e4-d4f6-4277-ace6-a005bfe75e1e" target="_blank" rel="noopener noreferrer"><strong>HR Teamware</strong><br><span class="small">Time-in & Time-out and for filing of schedule</span></a><a class="callout" href="https://reedelsevier.service-now.com/reed" target="_blank" rel="noopener noreferrer"><strong>ServiceNow</strong><br><span class="small">Filing of tickets for system issues</span></a><a class="callout" href="https://reedelsevier.sharepoint.com/:x:/r/sites/OG-REPHRegComp/_layouts/15/Doc.aspx?sourcedoc=%7B2A7346AD-F638-4842-BF25-506EEB9E21A7%7D&file=HR%20Teamware%20Adjustment%20Tracker.xlsx&action=default&mobileredirect=true" target="_blank" rel="noopener noreferrer"><strong>HRTW Adjustments</strong><br><span class="small">Open the HR Teamware Adjustment Tracker in SharePoint.</span></a><a class="callout" href="https://reedelsevier.sharepoint.com/:x:/r/sites/OG-REPHRegComp/_layouts/15/Doc.aspx?sourcedoc=%7B24AEE479-F675-4200-A7AE-DAE423C5D8C4%7D&file=Chrono%20Adjustment%20Tracker.xlsx&action=default&mobileredirect=true" target="_blank" rel="noopener noreferrer"><strong>TimeSheet Adjustments</strong><br><span class="small">Open the TimeSheet Adjustment Tracker in Sharepoint</span></a></div></div></section>${filterPanel(raw, filtered, editor, month)}${monthlyMatrix(filtered, editor)}<section class="two-col"><div class="panel chart"><h3>Task Load by Month</h3>${Object.keys(tasks.by_month).length?makeTimeline(monthSort(Object.keys(tasks.by_month)).map(m=>[m,tasks.by_month[m]])):'<div class="empty-state">No tasks for this editor.</div>'}</div><div class="panel chart"><h3>Mirroring Activity by Month</h3>${Object.keys(mir.by_month).length?makeTimeline(monthSort(Object.keys(mir.by_month)).map(m=>[m,mir.by_month[m]])):'<div class="empty-state">No mirroring activity for this editor.</div>'}</div></section><section class="two-col"><div class="panel chart"><h3>Task by Count</h3>${Object.keys(taskCountMap).length?makeBars(topEntries(taskCountMap,6)):'<div class="empty-state">No tasks for this editor.</div>'}</div><div class="panel chart"><h3>Mirrored Asset Mix</h3>${Object.keys(mir.by_asset).length?makeBars(topEntries(mir.by_asset,6)):'<div class="empty-state">No mirroring activity for this editor.</div>'}</div></section></section>`;}
function renderMetrics(filtered, editor){const sm=filtered.summary.metrics, monthly=monthSort(Object.keys(sm.by_month||{})).map(m=>[m,sm.by_month[m]]), rows=(filtered.metrics||[]).map(r=>[r.month,r.editor,fmt(r.quality),fmt(r.productivity),fmt(r.efficiency),fmt(r.utilization)]); return `<section class="view" data-view="metrics"><div class="page-title"><div><h2>Metrics</h2><p>Worksheet-level view for quality, productivity, efficiency, and utilization.</p></div><div class="badge">${editor}</div></div><section class="metric-grid">${ringCard('Quality',sm.overall_avg.quality,editor)}${ringCard('Productivity',sm.overall_avg.productivity,editor)}${ringCard('Efficiency',sm.overall_avg.efficiency,editor)}${ringCard('Utilization',sm.overall_avg.utilization,editor)}</section><section class="two-col"><div class="panel chart"><h3>Average Quality by Month</h3>${monthly.length?makeBars(monthly.map(([m,v])=>[m,v.quality])):'<div class="empty-state">No metric rows for this editor.</div>'}</div><div class="panel chart"><h3>Average Utilization by Month</h3>${monthly.length?makeBars(monthly.map(([m,v])=>[m,v.utilization])):'<div class="empty-state">No metric rows for this editor.</div>'}</div></section><div class="panel">${rows.length?makeTable(['Month','Editor','Quality','Productivity','Efficiency','Utilization'],rows):'<div class="empty-state">No metric data for this editor.</div>'}</div></section>`;}
function renderTasks(filtered, editor){const s=filtered.summary.tasks, taskCountMap=s.by_count||s.by_type||{}, monthEntries=monthSort(Object.keys(s.by_month||{})).map(m=>[m,s.by_month[m]]), rows=(filtered.tasks||[]).map(r=>[r.month,r.editor,r.task_type,r.status,fmt(r.count||1,0)]); return `<section class="view" data-view="tasks"><div class="page-title"><div><h2>Task Management</h2><p>Task intake, completion, and count-based workload from the workbook.</p></div><div class="badge">${editor}</div></div><section class="two-col"><div class="panel chart"><h3>Tasks by Month</h3>${monthEntries.length?makeTimeline(monthEntries):'<div class="empty-state">No task rows for this editor.</div>'}</div><div class="panel chart"><h3>Task by Count</h3>${Object.keys(taskCountMap).length?makeBars(topEntries(taskCountMap,8)):'<div class="empty-state">No task rows for this editor.</div>'}</div></section><section class="two-col"><div class="panel chart"><h3>Tasks by Editor</h3>${Object.keys(s.by_editor).length?makeBars(topEntries(s.by_editor,8)):'<div class="empty-state">No task rows for this editor.</div>'}</div><div class="panel chart"><h3>Status Breakdown</h3>${Object.keys(s.status).length?makeBars(topEntries(s.status,8)):'<div class="empty-state">No task rows for this editor.</div>'}</div></section><div class="panel">${rows.length?makeTable(['Month','Editor','Task Type','Status','Count'],rows):'<div class="empty-state">No task data for this editor.</div>'}</div></section>`;}
function renderMirroring(filtered, editor){const s=filtered.summary.mirroring, monthEntries=monthSort(Object.keys(s.by_month||{})).map(m=>[m,s.by_month[m]]), rows=(filtered.mirroring||[]).map(r=>[r.date,r.month,r.editor,r.asset,r.status]); return `<section class="view" data-view="mirroring"><div class="page-title"><div><h2>Mirroring</h2><p>Asset movement, editor activity, and status trends from the mirroring worksheet.</p></div><div class="badge">${editor}</div></div><section class="two-col"><div class="panel chart"><h3>Mirroring by Month</h3>${monthEntries.length?makeTimeline(monthEntries):'<div class="empty-state">No mirroring rows for this editor.</div>'}</div><div class="panel chart"><h3>Asset Mix</h3>${Object.keys(s.by_asset).length?makeBars(topEntries(s.by_asset,8)):'<div class="empty-state">No mirroring rows for this editor.</div>'}</div></section><section class="two-col"><div class="panel chart"><h3>Records by Editor</h3>${Object.keys(s.by_editor).length?makeBars(topEntries(s.by_editor,8)):'<div class="empty-state">No mirroring rows for this editor.</div>'}</div><div class="panel chart"><h3>Status Breakdown</h3>${Object.keys(s.status).length?makeBars(topEntries(s.status,8)):'<div class="empty-state">No mirroring rows for this editor.</div>'}</div></section><div class="panel">${rows.length?makeTable(['Date','Month','Editor','Asset','Status'],rows):'<div class="empty-state">No mirroring data for this editor.</div>'}</div></section>`;}
function currentView(){const v=(location.hash||'#overview').replace('#','').toLowerCase(); return ['overview','metrics','tasks','mirroring'].includes(v)?v:'overview';}
function updateNavState(v){document.querySelectorAll('.nav-links a').forEach(a=>a.classList.toggle('active',(a.getAttribute('href')||'').replace('#','')===v)); document.querySelectorAll('.view').forEach(el=>el.classList.toggle('active',el.dataset.view===v));}
function bindEditorFilter(){const sel=document.getElementById('editorFilter'); if(sel) sel.addEventListener('change', e=>{setSelectedEditor(e.target.value); renderApp(); updateNavState(currentView());});}
function bindMonthFilter(){const sel=document.getElementById('monthFilter'); if(sel) sel.addEventListener('change', e=>{setSelectedMonth(e.target.value); renderApp(); updateNavState(currentView());});}
function renderApp(){const raw=getData(), editor=getSelectedEditor(), month=getSelectedMonth(), editorFiltered=filterByEditor(raw, editor), filtered=filterByMonth(editorFiltered, month), app=document.getElementById('app'); app.innerHTML=`<div class="sp-banner"><strong>SharePoint deployment:</strong> Internal navigation keeps the dashboard on one page, and the editor and month filters highlight the exact slice of metrics, tasks, and mirroring activity you want to review.</div>${nav()}${renderOverview(raw,filtered,editor,month)}${renderMetrics(filtered,editor)}${renderTasks(filtered,editor)}${renderMirroring(filtered,editor)}<div class="footer-note">Source workbook: ${TEMPLATE_WORKBOOK_NAME}</div>`; bindEditorFilter(); bindMonthFilter(); setupImportExport(); updateNavState(currentView());}
window.addEventListener('hashchange', ()=>updateNavState(currentView()));
renderApp();
autoLoadWorkbook(true);
setInterval(()=>autoLoadWorkbook(false), AUTO_REFRESH_INTERVAL_MS);
